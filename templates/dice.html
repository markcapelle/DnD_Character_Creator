<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/dice_animations.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon-16x16.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='site.webmanifest') }}">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">

    <title>Dice</title>

</head>
<body>
    <h1>Dice Box</h1>

    <label for="dice-count">Number of dice:</label>
    <select id="dice-count">
        {% for i in range(1, 11) %}
            <option value="{{ i }}">{{ i }}</option>
        {% endfor %}
    </select>
    
    <button onclick="rollDice(4)">d4</button>
    <button onclick="rollDice(6)">d6</button>
    <button onclick="rollDice(8)">d8</button>
    <button onclick="rollDice(10)">d10</button>
    <button onclick="rollDice(12)">d12</button>
    <button onclick="rollDice(20)">d20</button>
    <button onclick="rollDice(100)">d100</button>

    <div id="dice-output"></div>
    <div id="dice-visuals"></div>

    <script src="{{ url_for('static', filename='js/dice.js') }}"></script>
</body>
</html>
