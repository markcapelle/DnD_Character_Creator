<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dice</title>

    <style>
        #dice-visuals {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .die {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            background: #222;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 0 6px rgba(0,0,0,0.5);
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
        }
        .die.roll {
            animation: roll 0.4s ease;
        }
        @keyframes roll {
            0%   { transform: rotateX(0deg) rotateY(0deg) scale(1); }
            25%  { transform: rotateX(90deg) rotateY(45deg) scale(1.1); }
            50%  { transform: rotateX(180deg) rotateY(90deg) scale(0.9); }
            75%  { transform: rotateX(270deg) rotateY(135deg) scale(1.05); }
            100% { transform: rotateX(360deg) rotateY(180deg) scale(1); }
        }
    </style>
    
</head>
<body>
    <h1>Dice</h1>

    <label for="dice-count">Number of dice:</label>
    <select id="dice-count">
        {% for i in range(1, 11) %}
            <option value="{{ i }}">{{ i }}</option>
        {% endfor %}
    </select>
    
    <button onclick="rollDice(4)">d4</button>
    <button onclick="rollDice(6)">d6</button>
    <button onclick="rollDice(8)">d8</button>
    <button onclick="rollDice(10)">d10</button>
    <button onclick="rollDice(12)">d12</button>
    <button onclick="rollDice(20)">d20</button>
    <button onclick="rollDice(100)">d100</button>

    <div id="dice-output"></div>
    <div id="dice-visuals"></div>

    <script src="{{ url_for('static', filename='js/dice.js') }}"></script>
</body>
</html>
